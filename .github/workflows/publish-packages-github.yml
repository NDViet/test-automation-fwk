name: Publish Java Packages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-java-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_MAVEN_USERNAME: ${{ secrets.GH_PACKAGES_USERNAME != '' && secrets.GH_PACKAGES_USERNAME || github.actor }}
      GH_MAVEN_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Resolve deploy revision
        shell: bash
        run: |
          base_revision="$(sed -n 's/^version=//p' gradle.properties | head -n 1)"
          if [ -z "${base_revision}" ]; then
            echo "Could not resolve version from gradle.properties"
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            deploy_revision="${base_revision%-SNAPSHOT}"
          else
            if [[ "${base_revision}" == *-SNAPSHOT ]]; then
              deploy_revision="${base_revision}"
            else
              deploy_revision="${base_revision}-SNAPSHOT"
            fi
          fi

          echo "DEPLOY_REVISION=${deploy_revision}" >> "${GITHUB_ENV}"
          echo "Deploy revision: ${deploy_revision}"

      - name: Build and test
        run: ./gradlew --no-daemon build
        env:
          ORG_GRADLE_PROJECT_version: ${{ env.DEPLOY_REVISION }}

      - name: Publish to GitHub Packages
        run: ./gradlew --no-daemon publishAllPublicationsToGitHubPackagesRepository
        env:
          ORG_GRADLE_PROJECT_version: ${{ env.DEPLOY_REVISION }}
          ORG_GRADLE_PROJECT_githubPackagesRepository: ${{ github.repository }}
          GH_MAVEN_USERNAME: ${{ env.GH_MAVEN_USERNAME }}
          GH_MAVEN_TOKEN: ${{ env.GH_MAVEN_TOKEN }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
