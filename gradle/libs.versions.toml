rest-assured = { module = "io.rest-assured:rest-assured", version.ref = "rest-assured" }
selenium-java = { module = "org.seleniumhq.selenium:selenium-java", version.ref = "selenium" }
snakeyaml = { module = "org.yaml:snakeyaml", version.ref = "snakeyaml" }
spring-context-support = { module = "org.springframework:spring-context-support", version.ref = "spring-context-support" }
sshd-core = { module = "org.apache.sshd:sshd-core", version.ref = "sshd-core" }
