[versions]
ashot = "1.5.4"
commons-io = "2.21.0"
commons-lang3 = "3.20.0"
freemarker = "2.3.34"
jackson-databind = "2.21.1"
junit-jupiter = "6.1.0-M1"
kubernetes-client = "7.6.1"
log4j = "3.0.0-beta2"
mockito = "5.23.0"
mockito-inline = "5.2.0"
playwright = "1.58.0"
poi = "5.5.1"
rest-assured = "6.0.0"
selenium = "4.41.0"
snakeyaml = "2.6"
spring-context-support = "7.0.5"
